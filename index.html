<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brigadeiros Personalizados</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Brigadeiros Personalizados</h1>
    <h2>Personalize suas bandejas</h2>
    <div class="brigadeiro-options">
        <div class="option">
            <h3>Brigadeiro Tradicional</h3>
            <button onclick="addBrigadeiro('tradicional')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Leite Ninho</h3>
            <button onclick="addBrigadeiro('leite-ninho')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Morango</h3>
            <button onclick="addBrigadeiro('morango')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Ninho com Nutella</h3>
            <button onclick="addBrigadeiro('nutella')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Beijinho</h3>
            <button onclick="addBrigadeiro('beijinho')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Pistache</h3>
            <button onclick="addBrigadeiro('pistache')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Oreo</h3>
            <button onclick="addBrigadeiro('oreo')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Esticadinho</h3>
            <button onclick="addBrigadeiro('esticadinho')">Adicionar</button>
        </div>
        <div class="option">
            <h3>Brigadeiro de Churrus</h3>
            <button onclick="addBrigadeiro('churrus')">Adicionar</button>
        </div>
        </div>
        <div class="carrinho">
        <button onclick="carrinho()">Carrinho</button>
            </div>
</body>
<script src="script.js"></script>
</html>
